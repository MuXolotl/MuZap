; MuZap configuration file
; Values:
;   GameFilterMode: off | all | tcp | udp
;
; Hosts backup:
;   BackupMode:
;     off       - no backups
;     once      - create only one "original" backup and never create more
;     single    - keep one rolling backup (overwrite each time)
;     timestamp - create a timestamped backup each time (not recommended)

[App]
Version=1.0.3

[Features]
GameFilterMode=off

[Hosts]
BackupMode=once
