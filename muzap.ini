; MuZap configuration file
; Values:
;   GameFilterMode: off | all | tcp | udp
;
; Telemetry:
;   TelemetryEnabled: true | false
;     Sends anonymous test results (ISP, region, strategy scores) to help
;     identify which strategies work best across different providers.
;     No IP address is ever stored.
;
; Hosts backup:
;   BackupMode:
;     off       - no backups
;     once      - create only one "original" backup and never create more
;     single    - keep one rolling backup (overwrite each time)
;     timestamp - create a timestamped backup each time (not recommended)

[App]
Version=1.1.0

[Features]
GameFilterMode=off
TelemetryEnabled=true

[Hosts]
BackupMode=once
