name: Code Linter (PowerShell + Batch)

on:
  push:
    paths:
      - '**/*.ps1'
      - '**/*.psm1'
      - '**/*.psd1'
      - '**/*.bat'
      - '**/*.cmd'
      - '.github/workflows/code_linter.yml'
  pull_request:
    paths:
      - '**/*.ps1'
      - '**/*.psm1'
      - '**/*.psd1'
      - '**/*.bat'
      - '**/*.cmd'
      - '.github/workflows/code_linter.yml'

jobs:
  lint:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ----------------------------
      # PowerShell: PSScriptAnalyzer
      # ----------------------------
      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: |
          Install-Module PSScriptAnalyzer -Scope CurrentUser -Force -AllowClobber

      - name: Run PSScriptAnalyzer (grouped log, non-blocking)
        shell: pwsh
        run: |
          $severity = @('Error','Warning','Information')

          $psFiles = @(git ls-files '*.ps1' '*.psm1' '*.psd1')
          if (-not $psFiles -or $psFiles.Count -eq 0) {
            Write-Host "No PowerShell files found."
            exit 0
          }

          $totalFindings = 0

          foreach ($f in $psFiles) {
            Write-Host "::group::PSScriptAnalyzer: $f"

            try {
              $res = @(Invoke-ScriptAnalyzer -Path $f -Severity $severity)
            }
            catch {
              Write-Host "PSScriptAnalyzer crashed for file: $f"
              Write-Host $_.Exception.Message
              Write-Host "::endgroup::"
              continue
            }

            if (-not $res -or $res.Count -eq 0) {
              Write-Host "OK (no findings)"
              Write-Host "::endgroup::"
              continue
            }

            foreach ($r in $res) {
              $totalFindings++

              $sev  = [string]$r.Severity
              $rule = [string]$r.RuleName
              $line = $r.Line
              if (-not $line) { $line = 1 }

              # разные версии/выводы иногда дают Column или StartColumnNumber
              $col = $null
              if ($r.PSObject.Properties.Name -contains 'Column') { $col = $r.Column }
              if (-not $col -and ($r.PSObject.Properties.Name -contains 'StartColumnNumber')) { $col = $r.StartColumnNumber }
              if (-not $col) { $col = 1 }

              $msg = [string]$r.Message

              Write-Host ("[{0}] {1} L{2} C{3}: {4}" -f $sev, $rule, $line, $col, $msg)
            }

            Write-Host "::endgroup::"
          }

          Write-Host "PSScriptAnalyzer total findings: $totalFindings"
          exit 0

      # ----------------------------
      # Batch: Blinter
      # ----------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Blinter
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir Blinter

      - name: Run Blinter (grouped log, non-blocking)
        shell: pwsh
        run: |
          $code = @'
          import subprocess
          import sys
          import blinter

          files = subprocess.check_output(
              ["git", "ls-files", "*.bat", "*.cmd"],
              text=True
          ).splitlines()

          if not files:
              print("No batch files found.")
              sys.exit(0)

          total = 0

          for f in files:
              print(f"::group::Blinter: {f}")
              try:
                  issues = blinter.lint_batch_file(f)
              except Exception as e:
                  print(f"Blinter crashed for file: {f}")
                  print(str(e))
                  print("::endgroup::")
                  continue

              if not issues:
                  print("OK (no findings)")
                  print("::endgroup::")
                  continue

              for issue in issues:
                  total += 1
                  sev = issue.rule.severity.value   # 'Error'/'Warning'/...
                  code = issue.rule.code
                  name = issue.rule.name
                  line = getattr(issue, "line_number", None) or 1

                  explanation = issue.rule.explanation or ""
                  recommendation = issue.rule.recommendation or ""

                  # одна строка = легче читать в логе
                  msg = f"[{sev}] {code} L{line}: {name}"
                  if explanation:
                      msg += f" | {explanation}"
                  if recommendation:
                      msg += f" | Fix: {recommendation}"

                  print(msg)

              print("::endgroup::")

          print(f"Blinter total findings: {total}")
          sys.exit(0)
          '@

          python -c $code
