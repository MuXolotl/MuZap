name: Code Linter (PowerShell + Batch)

on:
  push:
    paths:
      - '**/*.ps1'
      - '**/*.psm1'
      - '**/*.psd1'
      - '**/*.bat'
      - '**/*.cmd'
      - '.github/workflows/code_linter.yml'
  pull_request:
    paths:
      - '**/*.ps1'
      - '**/*.psm1'
      - '**/*.psd1'
      - '**/*.bat'
      - '**/*.cmd'
      - '.github/workflows/code_linter.yml'

jobs:
  lint:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ----------------------------
      # PowerShell: PSScriptAnalyzer
      # ----------------------------
      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module PSScriptAnalyzer -Scope CurrentUser -Force -AllowClobber

      - name: Run PSScriptAnalyzer (ALL messages, grouped by file, non-blocking)
        shell: pwsh
        continue-on-error: true
        run: |
          function Safe-WriteMessage([string]$line) {
            if ($null -eq $line) { return }
            if ($line.StartsWith("::")) { $line = " " + $line }
            Write-Host $line
          }

          $psFiles = @(git ls-files '*.ps1' '*.psm1' '*.psd1')
          if (-not $psFiles -or $psFiles.Count -eq 0) {
            Write-Host "No PowerShell files found."
            exit 0
          }

          $total = 0

          foreach ($f in $psFiles) {
            Write-Host "::group::PSScriptAnalyzer: $f"

            try {
              $res = @(Invoke-ScriptAnalyzer -Path $f -ErrorAction Continue)
            }
            catch {
              Safe-WriteMessage "PSScriptAnalyzer crashed for file."
              Safe-WriteMessage ($_.Exception.Message)
              Write-Host "::endgroup::"
              continue
            }

            if (-not $res -or $res.Count -eq 0) {
              Write-Host "OK (no findings)"
              Write-Host "::endgroup::"
              continue
            }

            foreach ($r in $res) {
              $total++
              $sev = [string]$r.Severity
              $msg = [string]$r.Message

              # Safe-WriteMessage $msg
              Safe-WriteMessage ("[{0}] {1}" -f $sev, $msg)
            }

            Write-Host "::endgroup::"
          }

          Write-Host "PSScriptAnalyzer total findings: $total"
          exit 0

      # ----------------------------
      # Batch: Blinter
      # ----------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Blinter
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir Blinter

      - name: Run Blinter (ALL messages, grouped by file, non-blocking)
        shell: pwsh
        continue-on-error: true
        run: |
          $code = @'
          import subprocess
          import sys
          import blinter

          def safe_msg(s: str) -> str:
              if s is None:
                  return ""
              if s.startswith("::"):
                  return " " + s
              return s

          files = subprocess.check_output(
              ["git", "ls-files", "*.bat", "*.cmd"],
              text=True
          ).splitlines()

          if not files:
              print("No batch files found.")
              sys.exit(0)

          total = 0

          for f in files:
              print(f"::group::Blinter: {f}")
              try:
                  issues = blinter.lint_batch_file(f)
              except Exception as e:
                  print(safe_msg("Blinter crashed for file."))
                  print(safe_msg(str(e)))
                  print("::endgroup::")
                  continue

              if not issues:
                  print("OK (no findings)")
                  print("::endgroup::")
                  continue

              for issue in issues:
                  total += 1
                  sev = issue.rule.severity.value  # 'Error'/'Warning'/...

                  text = issue.rule.explanation or issue.rule.name or "Issue"
                  rec  = issue.rule.recommendation or ""

                  # print(safe_msg(text))
                  print(safe_msg(f"[{sev}] {text}"))

                  if rec:
                      print(safe_msg(f"  {rec}"))

              print("::endgroup::")

          print(f"Blinter total findings: {total}")
          sys.exit(0)
          '@

          python -c $code
