name: Code Linter (PowerShell + Batch)

on:
  push:
    paths:
      - '**/*.ps1'
      - '**/*.psm1'
      - '**/*.psd1'
      - '**/*.bat'
      - '**/*.cmd'
      - '.github/workflows/code_linter.yml'
  pull_request:
    paths:
      - '**/*.ps1'
      - '**/*.psm1'
      - '**/*.psd1'
      - '**/*.bat'
      - '**/*.cmd'
      - '.github/workflows/code_linter.yml'

jobs:
  lint:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ----------------------------
      # PowerShell: PSScriptAnalyzer
      # ----------------------------
      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module PSScriptAnalyzer -Scope CurrentUser -Force -AllowClobber

      - name: Run PSScriptAnalyzer (ALL output, grouped by file, non-blocking)
        shell: pwsh
        continue-on-error: true
        run: |
          function Safe-WriteLine([string]$line) {
            if ($null -eq $line) { return }
            if ($line.StartsWith("::")) { $line = " " + $line }
            Write-Host $line
          }

          $psFiles = @(git ls-files '*.ps1' '*.psm1' '*.psd1')
          if (-not $psFiles -or $psFiles.Count -eq 0) {
            Safe-WriteLine "No PowerShell files found."
            exit 0
          }

          $total = 0

          foreach ($f in $psFiles) {
            Safe-WriteLine "::group::PSScriptAnalyzer: $f"

            try {
              # ВАЖНО: без -Severity => не фильтруем, выводим всё что отдаёт analyzer
              $res = @(Invoke-ScriptAnalyzer -Path $f -ErrorAction Continue)
            }
            catch {
              Safe-WriteLine "PSScriptAnalyzer crashed for file: $f"
              Safe-WriteLine ($_.Exception | Out-String)
              Safe-WriteLine "::endgroup::"
              continue
            }

            if (-not $res -or $res.Count -eq 0) {
              Safe-WriteLine "OK (no findings)"
              Safe-WriteLine "::endgroup::"
              continue
            }

            foreach ($r in $res) {
              $total++

              $sev  = [string]$r.Severity
              $rule = [string]$r.RuleName
              $line = $r.Line; if (-not $line) { $line = 1 }

              $col = $null
              if ($r.PSObject.Properties.Name -contains 'Column') { $col = $r.Column }
              if (-not $col -and ($r.PSObject.Properties.Name -contains 'StartColumnNumber')) { $col = $r.StartColumnNumber }
              if (-not $col) { $col = 1 }

              $msg = [string]$r.Message

              Safe-WriteLine ("[{0}] {1} L{2} C{3}: {4}" -f $sev, $rule, $line, $col, $msg)

              Safe-WriteLine "---- RAW RECORD (Format-List *) ----"
              ($r | Format-List * | Out-String).TrimEnd("`r","`n") -split "`r?`n" | ForEach-Object { Safe-WriteLine $_ }
              Safe-WriteLine "------------------------------------"
            }

            Safe-WriteLine "::endgroup::"
          }

          Safe-WriteLine "PSScriptAnalyzer total findings: $total"
          exit 0

      # ----------------------------
      # Batch: Blinter
      # ----------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Blinter
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir Blinter

      - name: Run Blinter (ALL output, grouped by file, non-blocking)
        shell: pwsh
        continue-on-error: true
        run: |
          $code = @'
          import subprocess
          import sys

          import blinter

          def safe_print(s: str):
              if s is None:
                  return
              if s.startswith("::"):
                  s = " " + s
              print(s)

          def dump_obj(obj, title="RAW OBJECT"):
              safe_print(f"---- {title} ----")
              try:
                  d = vars(obj)
                  for k in sorted(d.keys()):
                      safe_print(f"{k}: {d[k]!r}")
              except Exception as e:
                  safe_print(f"(vars() not available: {e})")
                  safe_print(repr(obj))
              safe_print("------------------")

          files = subprocess.check_output(
              ["git", "ls-files", "*.bat", "*.cmd"],
              text=True
          ).splitlines()

          if not files:
              safe_print("No batch files found.")
              sys.exit(0)

          total = 0

          for f in files:
              safe_print(f"::group::Blinter: {f}")
              try:
                  issues = blinter.lint_batch_file(f)
              except Exception as e:
                  safe_print(f"Blinter crashed for file: {f}")
                  safe_print(str(e))
                  safe_print("::endgroup::")
                  continue

              if not issues:
                  safe_print("OK (no findings)")
                  safe_print("::endgroup::")
                  continue

              for issue in issues:
                  total += 1
                  sev = issue.rule.severity.value
                  code = issue.rule.code
                  name = issue.rule.name
                  line = getattr(issue, "line_number", None) or 1

                  explanation = issue.rule.explanation or ""
                  recommendation = issue.rule.recommendation or ""

                  safe_print(f"[{sev}] {code} L{line}: {name}")
                  if explanation:
                      safe_print(f"  Explanation: {explanation}")
                  if recommendation:
                      safe_print(f"  Recommendation: {recommendation}")

                  dump_obj(issue, title="RAW ISSUE (vars(issue))")
                  dump_obj(issue.rule, title="RAW RULE (vars(issue.rule))")

              safe_print("::endgroup::")

          safe_print(f"Blinter total findings: {total}")
          sys.exit(0)
          '@

          python -c $code
