name: Manual Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 1.2.0)'
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate version format
        run: |
          if ! echo "${{ github.event.inputs.version }}" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "ERROR: Version '${{ github.event.inputs.version }}' is not valid."
            echo "Expected format: X.Y.Z (e.g. 1.2.0)"
            exit 1
          fi
          echo "Version format OK: ${{ github.event.inputs.version }}"

      - name: Update version in muzap.ini
        run: |
          sed -i 's/^Version=.*/Version=${{ github.event.inputs.version }}/' muzap.ini

      - name: Commit version bump
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add muzap.ini
          git commit -m "Bump version to ${{ github.event.inputs.version }}"
          git push

      - name: Create Zip Archive
        run: |
          zip -r MuZap_${{ github.event.inputs.version }}.zip . \
            -x ".git/*" \
            -x ".github/*" \
            -x ".gitattributes" \
            -x ".gitignore" \
            -x ".service/*" \
            -x "rust/*"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: Release v${{ github.event.inputs.version }}
          files: MuZap_${{ github.event.inputs.version }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}